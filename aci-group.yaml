apiVersion: 2021-09-01
location: westus
name: openclaw-group
properties:
  containers:
    - name: openclaw
      properties:
        image: ghcr.io/openclaw/openclaw:latest
        ports:
          - port: 18789
        resources:
          requests:
            cpu: 2
            memoryInGb: 4

    - name: telegram-webhook
      properties:
        image: ghcr.io/cubbadub/openclaw-telegram-webhook:latest
        imageRegistryCredentials:
          - server: ghcr.io
            username: cubbadub
            password: "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"
        ports:
          - port: 443
        environmentVariables:
          - name: TELEGRAM_TOKEN
            value: "8339297422:AAGBO9n3iRcDQMl2V7ZodS1Ih5bQQsx0E8Q"
        resources:
          requests:
            cpu: 1
            memoryInGb: 1

  ipAddress:
    type: Public
    ports:
      - protocol: TCP
        port: 443
    dnsNameLabel: openclawagent

  osType: Linux

resourceGroup: openclaw-rg
